task:
  title: "Implement Phase 14 — Discord Bot"
  description: >
    Implement the Discord bot (Phase 14 per implementation plan). The bot must:
    - Provide slash commands: /quiz start, /quiz answer, /search, /upload
    - Enforce guild/channel allowlists via mindforge/discord/auth.py
    - Resolve Discord users to internal UUIDs via IdentityResolver (provider='discord')
    - Delegate all business logic to application services (QuizService, SearchService, IngestionService)
    - Wire composition root in mindforge/discord/bot.py
    - Implement per-user SR reminders via DM (notifications cog)
    - Write unit tests: identity resolution, allowlist enforcement, interaction ownership
    - Ensure mindforge-discord entry point is callable
  status: "in_progress"
  tags:
    - "discord"
    - "bot"
    - "phase-14"
  priority: "high"

